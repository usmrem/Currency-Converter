<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>💰 My First Currency Converter</h1>
    
    <div class="converter">
        <div class="input-group">
            <label for="amount">Enter amount:</label>
            <input type="number" id="amount" value="1000" min="1" placeholder="Enter amount">
        </div>
        
        <div class="currency-container">
            <div class="currency-column">
                <label for="from">From currency:</label>
                <select id="from">
                    <option value="KZT">🇰🇿 KZT - Kazakh Tenge</option>
                    <option value="USD">🇺🇸 USD - US Dollar</option>
                    <option value="EUR">🇪🇺 EUR - Euro</option>
                </select>
            </div>
            
            <div class="currency-column">
                <label for="to">To currency:</label>
                <select id="to">
                    <option value="USD">🇺🇸 USD - US Dollar</option>
                    <option value="EUR">🇪🇺 EUR - Euro</option>
                    <option value="KZT">🇰🇿 KZT - Kazakh Tenge</option>
                </select>
            </div>
        </div>
        
        <button onclick="convertCurrency()">Convert</button>
        
        <div class="result" id="result">
            Result will appear here
        </div>
        
        <div class="fact" id="fact">
            Interesting fact about currencies...
        </div>
        
        <div class="history">
            <h3>📜 Conversion History:</h3>
            <ul id="history-list">
                <!-- History will be here -->
            </ul>
            <button onclick="clearHistory()" class="clear-btn">
                Clear History
            </button>
        </div>
    </div>
</body>
</html>
